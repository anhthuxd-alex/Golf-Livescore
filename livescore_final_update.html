<script>
// ★★★ THAY URL NÀY ★★★
const API = 'https://script.google.com/macros/s/AKfycbx8nTrOKlEfUihOzMVU24WcET21dzPWB2F9_yk67hEeuwGsemN-PxCVTGV2xw_ajppfrg/exec';

const T=['BK','GT','KT','XD'];
const TN={BK:'ĐH Bách khoa',GT:'ĐH Giao thông VT',KT:'ĐH Kiến trúc',XD:'ĐH Xây dựng'};
const GR=['A+','A','B','C','D','E','F'];
const PAR=[4,3,4,5,4,4,5,3,4, 4,4,3,5,4,3,4,5,4]; // C+D = 72
// Stroke Play sân B+C
const PAR_SP_B=[4,3,4,5,4,4,4,3,5]; // Sân B = 36
const PAR_SP_C=[4,3,4,5,4,4,5,3,4]; // Sân C = 36
const PAR_SP=PAR_SP_B.concat(PAR_SP_C); // B+C = 72

// Stroke Play golfer presets (from registration data)
const SP_GOLFERS=[
{n:'Minh (KM Thời)',h:11.2,s:'XD'},{n:'Đỗ Việt Tân',h:12.1,s:'XD'},{n:'Đặng Ngọc Tiến',h:11.8,s:'XD'},
{n:'Hùng (KM Thời)',h:14.5,s:'XD'},{n:'Nguyễn Viết Trường',h:13.1,s:'XD'},{n:'Thành 39',h:16.1,s:'XD'},
{n:'Phạm Xuân Thịnh',h:16.1,s:'XD'},{n:'Nguyễn Hồng Quân',h:11.7,s:'XD'},{n:'Nhất Nhất',h:29.9,s:'XD'},
{n:'Ms Giao',h:26.6,s:'XD'},{n:'Đinh Văn Tưởng',h:10.9,s:'XD'},{n:'Nguyễn Thành Nam',h:11.3,s:'XD'},
{n:'Phạm Quang Huy',h:10.3,s:'XD'},{n:'Dũng bay',h:12.2,s:'XD'},{n:'TTK Trung 46',h:21,s:'XD'},
{n:'Phạm Đức Lâm',h:24.5,s:'XD'},{n:'Phạm Hoàng Trung',h:16.5,s:'XD'},{n:'Nola Nguyen',h:17.6,s:'XD'},
{n:'Trần Thị Ánh',h:20.4,s:'XD'},{n:'A Giang Fuji',h:12,s:'XD'},{n:'Đoàn Đạt',h:16.3,s:'XD'},
{n:'Nguyễn Minh Tân',h:15,s:'XD'},{n:'Dương Công Định',h:26.3,s:'XD'},{n:'Hùng Alex',h:18.9,s:'XD'},
{n:'Mr Tân',h:16.1,s:'XD'},{n:'Chưởng',h:15.4,s:'XD'},{n:'Quang (KM)',h:11.6,s:'XD'},
];
let curSPFilter='all', curSPFlight=null;

// SM golfer preset data
const SM={
'A+':{BK:{n:'Nguyễn Văn Long',h:2.9},GT:{n:'Hoàng Quân',h:1.7},KT:{n:'Nguyễn Văn Tám',h:1.9},XD:{n:'Dương Văn Vinh',h:4.2}},
'A':{BK:{n:'Đỗ Thành Trung',h:5.5},GT:{n:'Nguyễn Quang Hiệp',h:5.7},KT:{n:'Chu Minh Tiến',h:8.4},XD:{n:'Nguyễn Văn Vĩnh',h:6.9}},
'B':{BK:{n:'Thạch',h:7.4},GT:{n:'Hoàng Anh Tuấn',h:7.3},KT:{n:'Hoàng Hữu Sơn',h:7.3},XD:{n:'Phan Việt Anh',h:7.9}},
'C':{BK:{n:'Vũ Hoàng Anh',h:11.6},GT:{n:'Nguyễn Văn Lợi',h:11},KT:{n:'Hoàng Thế Thực',h:10.7},XD:{n:'Nguyễn Viết Sang',h:10.4}},
'D':{BK:{n:'Nguyễn Ngọc Chiến',h:13.7},GT:{n:'Đậu Thắng',h:13.2},KT:{n:'Nguyễn Văn Nghĩa',h:12.1},XD:{n:'Ngô Ngọc Thu',h:13.5}},
'E':{BK:{n:'Đỗ Trường Giang',h:14.2},GT:{n:'Lưu Thanh Hà',h:15.6},KT:{n:'Lê Văn Trung',h:15.2},XD:{n:'Hoàng Ngọc',h:15.3}},
'F':{BK:{n:'Dương Trung Thủy',h:17.6},GT:{n:'Phạm Việt Cường',h:16.5},KT:{n:'Nguyễn Văn Hải',h:16.4},XD:{n:'Chu Văn Tiên',h:17.5}}
};

const FB=[
{p:'I',hdc:'≥10',m:[{a:'BK',b:'GT',g:['Lê Xuân Quý & Vũ Ngọc Biên','Hoàng Văn Hùng & Nguyễn Tuấn Hưng']},{a:'KT',b:'XD',g:['Nguyễn Anh Vũ & Tống Trung Hiếu','Ngô Văn Dũng & Vũ Minh Huy']}]},
{p:'II',hdc:'≥18',m:[{a:'KT',b:'BK',g:['Nguyễn Mạnh Chiến & Vũ Trọng Hùng','Lê Đức Kiên & Trịnh Văn Hùng']},{a:'XD',b:'GT',g:['Nguyễn Văn Kiên & Lê Đình Thời','Đặng Thanh Hải & Nguyễn Văn Khởi']}]},
{p:'III',hdc:'≥22',m:[{a:'GT',b:'KT',g:['Lê Anh Dũng & Vương Duy Hoàn','Phạm Quốc Toản & Trần Quang Hoà']},{a:'BK',b:'XD',g:['Nguyễn Thu Hương & Bùi Quang Trung','Hoàng Thanh Sơn & Hoàng Văn Công']}]},
{p:'IV',hdc:'≥26',m:[{a:'KT',b:'XD',g:['Nguyễn Ngọc Trỗi & Nguyễn Trần Dũng','Nguyễn Trung Dũng & Nguyễn Phúc Dũng']},{a:'BK',b:'GT',g:['Trần Xuân Hùng & Nguyễn Văn Bình','Nguyễn Mạnh Quân & Hoàng Anh Ngọc']}]},
{p:'V',hdc:'≥30',m:[{a:'XD',b:'GT',g:['Đỗ Quang Huy & Nguyễn Xuân Điệp','Nguyễn Đình Thành & Lê Tiến Dũng']},{a:'KT',b:'BK',g:['Nguyễn Đức Thắng & Hà Duy Khánh','Vũ Thế Hải & Trần Đăng Khoa']}]},
{p:'VI',hdc:'≥34',m:[{a:'GT',b:'KT',g:['Nguyễn Huy Hoàng & Nguyễn Viết Tân','Đỗ Hoàng Tùng & Nông Hồng Lộc']},{a:'BK',b:'XD',g:['Vũ Văn Chính & Lê Quốc Vượng','Hoàng Anh Thư & Vũ Thái Sơn']}]}
];

// ========== STATE ==========
let mode='caddy',tab='sm',curFlight=null,curPair=null;
let D={sm:{},fb:{},fbR:{},nameChanges:{}}; // nameChanges: {flight_team: {old,new,status:'pending'|'approved'|'rejected'}}
let online=false,syncing=false;

function init(){
  loadLocal();
  GR.forEach(f=>{if(!D.sm[f]){D.sm[f]={};T.forEach(t=>{D.sm[f][t]={n:SM[f][t].n,s:Array(18).fill(null)}})}});
  if(!D.nameChanges)D.nameChanges={};
  render();fetchServer();
  setInterval(()=>{if(mode==='live'||mode==='btc')fetchServer()},15000);
}
function loadLocal(){try{D=JSON.parse(localStorage.getItem('g4t3')||'{}');if(!D.sm)D.sm={};if(!D.fb)D.fb={};if(!D.fbR)D.fbR={};if(!D.nameChanges)D.nameChanges={};if(!D.sp)D.sp={};if(!D.fbM)D.fbM={}}catch(e){D={sm:{},fb:{},fbR:{},nameChanges:{},sp:{},fbM:{}}}}
function saveLocal(){localStorage.setItem('g4t3',JSON.stringify(D))}

// ========== MODE ==========
function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('on',['caddy','live','btc'][i]===m));
  if(m==='live')tab='bxh';else if(m==='btc')tab='approve';else tab='sm';
  if(m!=='caddy')fetchServer();
  render();
}
function setTab(t){tab=t;render()}

function render(){
  let tabs;
  if(mode==='caddy')tabs=[['sm','⚔️ Single'],['fb','👥 Fourball'],['sp','🏌️ Stroke']];
  else if(mode==='live')tabs=[['bxh','🏆 BXH'],['sm','⚔️ Single'],['fb','👥 Fourball'],['sp','🏌️ Stroke'],['tong','📊 Tổng']];
  else tabs=[['approve','✅ Phê duyệt'],['bxh','🏆 BXH'],['sp','🏌️ Stroke'],['tong','📊 Tổng']];
  document.getElementById('tabBar').innerHTML=tabs.map(([k,l])=>`<button class="tab ${tab===k?'on':''}" onclick="setTab('${k}')">${l}</button>`).join('');

  const c=document.getElementById('content');
  if(tab==='bxh')c.innerHTML=renderBXH();
  else if(tab==='sm')c.innerHTML=renderSM();
  else if(tab==='fb')c.innerHTML=renderFB();
  else if(tab==='tong')c.innerHTML=renderTotal();
  else if(tab==='approve')c.innerHTML=renderApprove();
  else if(tab==='sp')c.innerHTML=renderSP();

  const bar=document.getElementById('actionBar');
  if(mode==='caddy')bar.innerHTML='<button class="btn btn-p" onclick="syncToServer()">☁️ Đồng bộ lên Server</button><button class="btn btn-s" onclick="saveLocal();toast(\'Đã lưu local\',1)">💾 Lưu</button>';
  else bar.innerHTML='<button class="btn btn-p" onclick="fetchServer()">🔄 Cập nhật</button>';
}

// ========== NAME ==========
function getName(f,t){
  const key=f+'_'+t;
  const nc=D.nameChanges[key];
  if(nc&&nc.status==='approved')return nc.new;
  return D.sm[f]?.[t]?.n||SM[f]?.[t]?.n||'';
}

function proposeName(f,t,newName){
  const key=f+'_'+t;
  const orig=SM[f]?.[t]?.n||'';
  if(newName.trim()===orig){delete D.nameChanges[key];} // reverted to original
  else{D.nameChanges[key]={old:orig,new:newName.trim(),status:'pending'};}
  if(D.sm[f]&&D.sm[f][t])D.sm[f][t].n=newName.trim();
  saveLocal();render();
}

function approveName(key){D.nameChanges[key].status='approved';saveLocal();render();toast('✅ Đã duyệt',1)}
function rejectName(key){
  const nc=D.nameChanges[key];
  const[f,t]=key.split('_');
  // Revert name
  if(D.sm[f]&&D.sm[f][t])D.sm[f][t].n=nc.old;
  delete D.nameChanges[key];
  saveLocal();render();toast('Đã từ chối, khôi phục tên cũ',1);
}

// ========== SM CALC ==========
function calcSM(f){
  const r={};T.forEach(t=>{r[t]={hp:Array(18).fill(null),thp:0,mp:0}});
  const fd=D.sm[f];if(!fd)return r;
  for(let h=0;h<18;h++){
    const sc=T.map(t=>fd[t]?.s?.[h]);
    if(sc.some(v=>v==null))continue;
    const ns=sc.map(Number),mn=Math.min(...ns),cnt=ns.filter(v=>v===mn).length;
    T.forEach((t,i)=>{r[t].hp[h]=ns[i]===mn?(cnt===1?3:cnt===2?1.5:cnt===3?1:0):0});
  }
  T.forEach(t=>{r[t].thp=r[t].hp.reduce((a,v)=>a+(v||0),0)});
  const tots=T.map(t=>r[t].thp),mx=Math.max(...tots);
  if(mx>0){const cm=tots.filter(v=>v===mx).length;T.forEach((t,i)=>{if(tots[i]===mx)r[t].mp=cm===1?3:cm===2?1.5:cm===3?1:0})}
  return r;
}
function teamTotals(){
  const tot={};T.forEach(t=>{tot[t]={sm:0,fb:0}});
  GR.forEach(f=>{const r=calcSM(f);T.forEach(t=>{tot[t].sm+=r[t].mp})});
  Object.entries(D.fbR).forEach(([k,v])=>{
    for(const p of FB){for(let mi=0;mi<2;mi++){
      const mid=p.p+'_'+(mi===0?'A':'B');
      if(mid===k){const m=p.m[mi];if(v.a!=null)tot[m.a].fb+=Number(v.a);if(v.b!=null)tot[m.b].fb+=Number(v.b)}
    }}
  });
  return tot;
}

// ========== RENDER ==========
function renderBXH(){
  const tot=teamTotals();
  const rk=T.map(t=>({t,total:tot[t].sm+tot[t].fb,sm:tot[t].sm,fb:tot[t].fb})).sort((a,b)=>b.total-a.total);
  return`<div class="stand">${rk.map((r,i)=>`<div class="tc ${i===0&&r.total>0?'g':''}">
    <div class="rk">#${i+1}</div><div class="logo t-${r.t}">${r.t}</div>
    <div class="tn">${TN[r.t]}</div><div class="ts">${r.total.toFixed(1)}</div>
    <div class="td">SM:${r.sm.toFixed(1)} FB:${r.fb.toFixed(1)}</div>
  </div>`).join('')}</div>`;
}

function renderSM(){
  if(mode==='caddy'){
    const fsel=`<div style="display:flex;gap:5px;padding:8px;flex-wrap:wrap">${GR.map(f=>{
      const has=D.sm[f]&&T.some(t=>D.sm[f][t]?.s?.some(v=>v!=null));
      return`<button style="flex:1;min-width:40px;padding:10px 6px;border-radius:8px;border:2px solid ${curFlight===f?'#3b82f6':has?'#22c55e':'#1e3050'};background:${curFlight===f?'#172554':'#111b2e'};color:${curFlight===f?'#60a5fa':has?'#22c55e':'#64748b'};font-size:13px;font-weight:800;cursor:pointer" onclick="curFlight='${f}';render()">${f}</button>`
    }).join('')}</div>`;
    if(!curFlight)return fsel+'<div style="text-align:center;padding:40px;color:#475569">Chọn bảng để nhập score</div>';
    const fd=D.sm[curFlight];
    const inputs=T.map(t=>{
      const sc=fd[t]?.s||Array(18).fill(null);
      const gross=sc.reduce((a,v)=>a+(v||0),0),cnt=sc.filter(v=>v!=null).length;
      const curName=getName(curFlight,t);
      const ncKey=curFlight+'_'+t;
      const nc=D.nameChanges[ncKey];
      const nameChanged=nc&&nc.status==='pending';
      return`<div class="si"><div class="si-h">
        <div class="bdg t-${t}">${t}</div>
        <input class="name-in ${nameChanged?'changed':''}" value="${curName}" onchange="proposeName('${curFlight}','${t}',this.value)" placeholder="Tên golfer">
        ${nameChanged?'<span class="nc-badge nc-pending">Chờ duyệt</span>':''}
        <div class="info">HDC:${SM[curFlight][t].h} ${cnt>0?'G:'+gross:''}</div>
      </div>
      <div class="hg">${[...Array(9)].map((_,i)=>`<div class="hc"><span class="hn">${i+1}</span><span class="pr">P${PAR[i]}</span>
        <input class="hi ${sc[i]!=null?'f':''}" type="number" inputmode="numeric" min="1" max="15" value="${sc[i]!=null?sc[i]:''}" onfocus="this.select()" onchange="smIn('${curFlight}','${t}',${i},this.value)"></div>`).join('')}
        <div class="hsep"></div>
        ${[...Array(9)].map((_,i)=>`<div class="hc"><span class="hn">${i+10}</span><span class="pr">P${PAR[i+9]}</span>
        <input class="hi ${sc[i+9]!=null?'f':''}" type="number" inputmode="numeric" min="1" max="15" value="${sc[i+9]!=null?sc[i+9]:''}" onfocus="this.select()" onchange="smIn('${curFlight}','${t}',${i+9},this.value)"></div>`).join('')}
      </div></div>`}).join('');
    return fsel+`<div class="sec"><div class="crd"><div class="crd-h"><span class="fl">Bảng ${curFlight}</span></div><div class="crd-b">${inputs}</div></div></div>`;
  } else {
    return'<div class="sec">'+GR.map(f=>{
      const r=calcSM(f);
      const played=T.every(t=>r[t].hp.some(h=>h!=null))?r[T[0]].hp.filter(h=>h!=null).length:0;
      const sorted=T.map(t=>({t,...r[t]})).sort((a,b)=>b.thp-a.thp);
      return`<div class="crd"><div class="crd-h" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'':'none'">
        <span class="fl">Bảng ${f}</span><span class="st">${played}/18 hố</span></div>
        <div class="crd-b">${sorted.map(g=>`<div class="gr">
          <div class="bdg t-${g.t}">${g.t}</div>
          <div class="nm">${getName(f,g.t)}<small>HDC:${SM[f][g.t].h}</small></div>
          <div class="hp">${g.thp.toFixed(1)}</div>
          <div class="mp ${g.mp>=3?'pw':g.mp>0?'pd':'pz'}">${g.mp.toFixed(1)}</div>
        </div>`).join('')}</div></div>`}).join('')+'</div>';
  }
}

function renderFB(){
  const psel=`<div style="display:flex;gap:5px;padding:8px;flex-wrap:wrap">${FB.map((p,i)=>
    `<button style="flex:1;min-width:36px;padding:10px 4px;border-radius:8px;border:2px solid ${curPair===i?'#3b82f6':'#1e3050'};background:${curPair===i?'#172554':'#111b2e'};color:${curPair===i?'#60a5fa':'#64748b'};font-size:12px;font-weight:800;cursor:pointer" onclick="curPair=${i};render()">${p.p}</button>`
  ).join('')}</div>`;

  if(mode==='caddy'){
    if(curPair===null)return psel+'<div style="text-align:center;padding:40px;color:#475569">Chọn cặp để nhập</div>';
    const pair=FB[curPair];
    return psel+'<div class="sec">'+pair.m.map((m,mi)=>{
      const mid=pair.p+'_'+(mi===0?'A':'B');
      initFBMatch(mid,m);
      const md=D.fbM[mid];
      const calc=calcFBMatch(mid);
      // Status bar
      const stBar=calc.status;
      const stColor=stBar.includes('UP')?'#22c55e':stBar==='TIED'?'#eab308':'#64748b';
      return`<div class="fb-c">
        <div class="fb-p">Cặp ${pair.p} - Trận ${mi+1}</div>
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
          <div class="bdg t-${m.a}" style="width:26px;height:26px">${m.a}</div>
          <div style="flex:1;font-size:12px;font-weight:700;color:${calc.leadA>0?'#22c55e':'#94a3b8'}">${TN[m.a]} ${calc.leadA>0?calc.leadA+'UP':calc.leadA<0?Math.abs(calc.leadA)+'D':''}</div>
          <div style="font-size:13px;font-weight:900;color:${stColor};padding:2px 8px;background:#111b2e;border-radius:6px">${stBar}</div>
          <div style="flex:1;font-size:12px;font-weight:700;text-align:right;color:${calc.leadA<0?'#22c55e':'#94a3b8'}">${calc.leadA<0?Math.abs(calc.leadA)+'UP':calc.leadA>0?calc.leadA+'D':''} ${TN[m.b]}</div>
          <div class="bdg t-${m.b}" style="width:26px;height:26px">${m.b}</div>
        </div>
        <div style="display:flex;gap:2px;margin:6px 0;flex-wrap:wrap">${calc.holes.map((h,i)=>
          `<div style="width:18px;height:18px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;background:${h==='+'?'#14532d':h==='-'?'#450a0a':'#1e3050'};color:${h==='+'?'#22c55e':h==='-'?'#ef4444':'#eab308'}">${h||''}</div>`
        ).join('')}</div>
        ${['g1a','g2a','g1b','g2b'].map(gk=>{
          const isA=gk.endsWith('a');
          const team=isA?m.a:m.b;
          const gLabel=gk.startsWith('g1')?'G1':'G2';
          const gName=isA?(gk==='g1a'?m.g[0].split(' & ')[0]:m.g[0].split(' & ')[1]):(gk==='g1b'?m.g[1].split(' & ')[0]:m.g[1].split(' & ')[1]);
          const sc=md[gk]||Array(18).fill(null);
          const gross=sc.reduce((a,v)=>a+(v||0),0),cnt=sc.filter(v=>v!=null).length;
          return`<div class="si"><div class="si-h">
            <div class="bdg t-${team}" style="width:20px;height:20px;font-size:7px">${team}</div>
            <div style="font-size:10px;font-weight:600;flex:1">${gName}</div>
            <div class="info">${cnt>0?'G:'+gross:''}</div>
          </div>
          <div class="hg">${[...Array(9)].map((_,i)=>`<div class="hc"><span class="hn">${i+1}</span><span class="pr">P${PAR[i]}</span>
            <input class="hi ${sc[i]!=null?'f':''}" type="number" inputmode="numeric" min="1" max="15" value="${sc[i]!=null?sc[i]:''}" onfocus="this.select()" onchange="fbHoleIn('${mid}','${gk}',${i},this.value)"></div>`).join('')}
            <div class="hsep"></div>
            ${[...Array(9)].map((_,i)=>`<div class="hc"><span class="hn">${i+10}</span><span class="pr">P${PAR[i+9]}</span>
            <input class="hi ${sc[i+9]!=null?'f':''}" type="number" inputmode="numeric" min="1" max="15" value="${sc[i+9]!=null?sc[i+9]:''}" onfocus="this.select()" onchange="fbHoleIn('${mid}','${gk}',${i+9},this.value)"></div>`).join('')}
          </div></div>`}).join('')}
      </div>`}).join('')+'</div>';
  } else {
    // Live/BTC view
    return psel+'<div class="sec">'+FB.map(pair=>
      `<div class="fb-c"><div class="fb-p">Cặp ${pair.p} <span style="color:#334155">| HDC ${pair.hdc}</span></div>
      ${pair.m.map((m,mi)=>{
        const mid=pair.p+'_'+(mi===0?'A':'B');
        const calc=calcFBMatch(mid);
        const stColor=calc.status.includes('UP')?'#22c55e':calc.status==='TIED'?'#eab308':'#64748b';
        const pA=calc.ptsA,pB=calc.ptsB;
        return`<div style="padding:6px;background:#0b1121;border-radius:6px;margin:4px 0">
          <div style="display:flex;align-items:center;gap:5px;margin-bottom:4px">
            <div class="bdg t-${m.a}" style="width:22px;height:22px;font-size:7px">${m.a}</div>
            <div style="flex:1;font-size:11px;font-weight:600;color:${calc.leadA>0?'#22c55e':'#94a3b8'}">${TN[m.a]} ${calc.leadA>0?calc.leadA+'UP':''}</div>
            <div style="font-size:11px;font-weight:900;color:${stColor}">${calc.status}</div>
            <div style="flex:1;font-size:11px;font-weight:600;text-align:right;color:${calc.leadA<0?'#22c55e':'#94a3b8'}">${calc.leadA<0?Math.abs(calc.leadA)+'UP':''} ${TN[m.b]}</div>
            <div class="bdg t-${m.b}" style="width:22px;height:22px;font-size:7px">${m.b}</div>
          </div>
          <div style="display:flex;gap:2px;flex-wrap:wrap">${calc.holes.map((h,i)=>
            `<div style="width:16px;height:16px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;background:${h==='+'?'#14532d':h==='-'?'#450a0a':h==='AS'?'#422006':'#1e3050'};color:${h==='+'?'#22c55e':h==='-'?'#ef4444':h==='AS'?'#eab308':'#334155'}">${h||'·'}</div>`
          ).join('')}</div>
          ${calc.played>0?`<div style="text-align:center;font-size:9px;color:#475569;margin-top:3px">${calc.played}/18 hố | ${m.a}: <b style="color:${pA===3?'#22c55e':pA===1.5?'#eab308':'#64748b'}">${pA!=null?pA.toFixed(1):'-'}</b> — ${m.b}: <b style="color:${pB===3?'#22c55e':pB===1.5?'#eab308':'#64748b'}">${pB!=null?pB.toFixed(1):'-'}</b></div>`:''}
        </div>`}).join('')}</div>`
    ).join('')+'</div>';
  }
}

function renderTotal(){
  const tot=teamTotals();
  const rk=T.map(t=>({t,total:tot[t].sm+tot[t].fb,...tot[t]})).sort((a,b)=>b.total-a.total);
  const smD={};T.forEach(t=>{smD[t]=[]});
  GR.forEach(f=>{const r=calcSM(f);T.forEach(t=>{smD[t].push(r[t].mp)})});
  return`<div class="sec"><div class="crd"><div class="crd-h"><span class="fl">TỔNG HỢP CHI TIẾT</span></div>
    <div class="crd-b" style="overflow-x:auto"><table class="tbl">
      <tr><th style="text-align:left">Đội</th>${GR.map(g=>`<th>${g}</th>`).join('')}<th style="color:#60a5fa">SM</th><th style="color:#22c55e">FB</th><th style="color:#eab308;font-size:13px">Tổng</th></tr>
      ${rk.map((r,i)=>`<tr${i===0?' style="background:#0a1e10"':''}>
        <td style="text-align:left;font-weight:700"><span class="bdg t-${r.t}" style="width:18px;height:18px;font-size:7px;display:inline-flex;vertical-align:middle;margin-right:2px">${r.t}</span>${TN[r.t]}</td>
        ${smD[r.t].map(p=>`<td style="color:${p>=3?'#22c55e':p>0?'#eab308':'#334155'}">${p.toFixed(1)}</td>`).join('')}
        <td style="font-weight:800;color:#60a5fa">${r.sm.toFixed(1)}</td>
        <td style="font-weight:800;color:#22c55e">${r.fb.toFixed(1)}</td>
        <td style="font-weight:900;font-size:15px;color:${i===0?'#eab308':'#fff'}">${r.total.toFixed(1)}</td>
      </tr>`).join('')}
    </table></div></div>
    <div style="text-align:center;padding:8px;font-size:9px;color:#334155">SM max:21 | FB max:18 | Tổng max:39 | Bằng điểm → Playoff SM bảng B/C</div></div>`;
}

// ========== BTC APPROVE ==========
function renderApprove(){
  const pending=Object.entries(D.nameChanges).filter(([k,v])=>v.status==='pending');
  let html='<div class="sec">';
  html+='<div class="crd"><div class="crd-h"><span class="fl">✅ PHÊ DUYỆT THAY ĐỔI TÊN</span><span class="st">'+pending.length+' chờ duyệt</span></div><div class="crd-b">';
  if(pending.length===0){
    html+='<div style="text-align:center;padding:20px;color:#475569">Không có yêu cầu nào</div>';
  } else {
    html+=pending.map(([key,nc])=>{
      const[f,t]=key.split('_');
      return`<div class="nc-row">
        <div class="bdg t-${t}">${t}</div>
        <div style="flex:1">
          <div style="font-size:9px;color:#64748b">Bảng ${f}</div>
          <span class="old">${nc.old}</span> <span class="arrow">→</span> <span class="new">${nc.new}</span>
        </div>
        <button class="nc-btn nc-ok" onclick="approveName('${key}')">✓ Duyệt</button>
        <button class="nc-btn nc-no" onclick="rejectName('${key}')">✗ Từ chối</button>
      </div>`}).join('');
  }
  // Show history of approved changes
  const approved=Object.entries(D.nameChanges).filter(([k,v])=>v.status==='approved');
  if(approved.length>0){
    html+='<div style="margin-top:12px;font-size:10px;color:#475569;font-weight:700">Đã duyệt:</div>';
    html+=approved.map(([key,nc])=>{
      const[f,t]=key.split('_');
      return`<div style="display:flex;align-items:center;gap:6px;padding:4px 8px;font-size:10px;color:#22c55e">
        <div class="bdg t-${t}" style="width:18px;height:18px;font-size:7px">${t}</div>
        Bảng ${f}: ${nc.old} → ${nc.new} ✓
      </div>`}).join('');
  }
  html+='</div></div></div>';
  return html;
}

// ========== STROKE PLAY ==========
function spBang(h){return h<=12?'A':h<=20?'B':'C'}

function initSP(){
  if(!D.sp||!D.sp.golfers||D.sp.golfers.length===0){
    D.sp={golfers:SP_GOLFERS.map((g,i)=>({id:'sp'+i,n:g.n,h:g.h,s:g.s,sc:Array(18).fill(null)}))};
  }
}

function renderSP(){
  initSP();
  const golfers=D.sp.golfers;
  if(mode==='caddy'){
    // Flight selector: group golfers by 4
    const flights=[];
    for(let i=0;i<golfers.length;i+=4){flights.push(golfers.slice(i,i+4))}
    const fsel=`<div style="display:flex;gap:5px;padding:8px;flex-wrap:wrap">
      ${flights.map((fl,i)=>`<button style="flex:none;padding:8px 12px;border-radius:8px;border:2px solid ${curSPFlight===i?'#7c3aed':'#1e3050'};background:${curSPFlight===i?'#2e1065':'#111b2e'};color:${curSPFlight===i?'#a78bfa':'#64748b'};font-size:11px;font-weight:800;cursor:pointer" onclick="curSPFlight=${i};render()">Fl${i+1}</button>`).join('')}
      <button style="flex:none;padding:8px 12px;border-radius:8px;border:2px solid #1e3050;background:#111b2e;color:#22c55e;font-size:11px;font-weight:700;cursor:pointer" onclick="addSPGolfer()">+ Thêm</button>
    </div>`;
    if(curSPFlight===null)return fsel+'<div style="text-align:center;padding:40px;color:#475569">Chọn flight để nhập score</div>';
    const fl=flights[curSPFlight]||[];
    const inputs=fl.map(g=>{
      const gi=golfers.indexOf(g);
      const sc=g.sc||Array(18).fill(null);
      const gross=sc.reduce((a,v)=>a+(v||0),0),cnt=sc.filter(v=>v!=null).length;
      const net=cnt>0?gross-Math.round(g.h):'-';
      return`<div class="si"><div class="si-h">
        <div class="bdg t-${g.s||'XD'}" style="font-size:7px">${g.s||'?'}</div>
        <input class="name-in" value="${g.n}" onchange="spName(${gi},this.value)" placeholder="Tên golfer">
        <div class="info">HDC:${g.h} ${cnt>0?'G:'+gross+' N:'+net:''}</div>
      </div>
      <div class="hg">${PAR_SP_B.map((_,i)=>`<div class="hc"><span class="hn">${i+1}</span><span class="pr">P${PAR_SP[i]}</span>
        <input class="hi ${sc[i]!=null?'f':''}" type="number" inputmode="numeric" min="1" max="15" value="${sc[i]!=null?sc[i]:''}" onfocus="this.select()" onchange="spIn(${gi},${i},this.value)"></div>`).join('')}
        <div class="hsep"></div>
        ${PAR_SP_C.map((_,i)=>`<div class="hc"><span class="hn">${i+10}</span><span class="pr">P${PAR_SP[i+9]}</span>
        <input class="hi ${sc[i+9]!=null?'f':''}" type="number" inputmode="numeric" min="1" max="15" value="${sc[i+9]!=null?sc[i+9]:''}" onfocus="this.select()" onchange="spIn(${gi},${i+9},this.value)"></div>`).join('')}
      </div></div>`}).join('');
    return fsel+`<div class="sec"><div class="crd"><div class="crd-h"><span class="fl">Flight ${curSPFlight+1}</span><span class="st">Sân B-C | Par 72</span></div><div class="crd-b">${inputs}</div></div></div>`;
  } else {
    // Live/BTC: Leaderboard by bảng
    const filter=`<div style="display:flex;gap:5px;padding:8px">${['all','A','B','C'].map(f=>
      `<button style="flex:1;padding:8px;border-radius:7px;border:1.5px solid ${curSPFilter===f?'#7c3aed':'#1e3050'};background:${curSPFilter===f?'#2e1065':'#111b2e'};color:${curSPFilter===f?'#a78bfa':'#64748b'};font-size:11px;font-weight:700;cursor:pointer" onclick="curSPFilter='${f}';render()">${f==='all'?'Tất cả':'Bảng '+f}</button>`
    ).join('')}</div>`;
    const bangs=curSPFilter==='all'?['A','B','C']:[curSPFilter];
    const cards=bangs.map(b=>{
      const hdcR=b==='A'?'HDC 0-12':b==='B'?'HDC 13-20':'HDC 21+';
      const bg=golfers.filter(g=>spBang(g.h)===b).map(g=>{
        const sc=g.sc||[];const cnt=sc.filter(v=>v!=null).length;
        const gross=sc.reduce((a,v)=>a+(v||0),0);
        const net=cnt>0?gross-Math.round(g.h):9999;
        return{...g,gross,net:cnt>0?net:null,cnt};
      }).sort((a,b)=>{
        if(a.cnt===0&&b.cnt>0)return 1;if(a.cnt>0&&b.cnt===0)return -1;
        if(a.cnt===0&&b.cnt===0)return 0;return a.net-b.net;
      });
      if(bg.length===0)return'';
      return`<div class="crd"><div class="crd-h" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'':'none'">
        <span class="fl">Bảng ${b} <span style="font-size:10px;color:#94a3b8;font-weight:500">(${hdcR})</span></span>
        <span class="st">${bg.filter(g=>g.cnt>0).length}/${bg.length} đã nhập</span></div>
        <div class="crd-b">${bg.map((g,i)=>{
          const gi=golfers.indexOf(golfers.find(x=>x.id===g.id));
          const rkc=g.cnt>0?(i===0?'color:#eab308':i===1?'color:#94a3b8':i===2?'color:#cd7f32':'color:#64748b'):'color:#334155';
          return`<div class="gr">
            <div style="font-size:13px;font-weight:900;min-width:24px;text-align:center;${rkc}">${g.cnt>0?i+1:'-'}</div>
            <div class="bdg t-${g.s||'XD'}" style="font-size:7px">${g.s||'?'}</div>
            <div class="nm">${g.n}<small>HDC:${g.h} | ${g.cnt}/18 hố</small></div>
            <div style="font-size:11px;color:#64748b;min-width:28px;text-align:center">${g.cnt>0?g.gross:'-'}</div>
            <div style="font-size:15px;font-weight:900;color:#22c55e;min-width:34px;text-align:right">${g.net!=null?g.net:'-'}</div>
            ${mode==='btc'?`<button onclick="spEdit(${gi})" style="background:#1e3050;color:#60a5fa;border:none;border-radius:4px;padding:3px 6px;font-size:9px;cursor:pointer;font-weight:700">✏️</button>
            <button onclick="spDel(${gi})" style="background:#7f1d1d;color:#fca5a5;border:none;border-radius:4px;padding:3px 6px;font-size:9px;cursor:pointer;font-weight:700">✗</button>`:''}
          </div>`}).join('')}</div></div>`;
    }).join('');
    const btcAdd=mode==='btc'?`<div style="padding:8px"><button onclick="addSPGolfer()" style="width:100%;padding:10px;border-radius:8px;border:2px dashed #7c3aed;background:#2e1065;color:#a78bfa;font-size:12px;font-weight:700;cursor:pointer">+ Thêm golfer Stroke Play</button></div>`:'';
    return filter+btcAdd+'<div class="sec">'+cards+'</div>';
  }
}

function spIn(gi,h,v){
  initSP();
  D.sp.golfers[gi].sc[h]=v===''?null:parseInt(v);
  saveLocal();render();
}
function spName(gi,v){
  initSP();
  D.sp.golfers[gi].n=v.trim();
  saveLocal();render();
}
function addSPGolfer(){
  initSP();
  const n=prompt('Tên golfer:');if(!n)return;
  const h=parseFloat(prompt('HDC Index:'))||20;
  const s=prompt('Trường (BK/GT/KT/XD):','XD')||'XD';
  D.sp.golfers.push({id:'sp'+Date.now(),n:n.trim(),h,s:s.toUpperCase(),sc:Array(18).fill(null)});
  saveLocal();render();
}
function spEdit(gi){
  initSP();
  const g=D.sp.golfers[gi];if(!g)return;
  const n=prompt('Tên golfer:',g.n);if(n===null)return;
  const h=prompt('HDC Index:',g.h);if(h===null)return;
  const s=prompt('Trường (BK/GT/KT/XD):',g.s);if(s===null)return;
  g.n=n.trim();g.h=parseFloat(h)||g.h;g.s=s.toUpperCase()||g.s;
  saveLocal();render();toast('✅ Đã cập nhật '+g.n,true);
}
function spDel(gi){
  initSP();
  const g=D.sp.golfers[gi];if(!g)return;
  if(!confirm('Xóa golfer '+g.n+'?'))return;
  D.sp.golfers.splice(gi,1);
  saveLocal();render();toast('Đã xóa '+g.n,true);
}

// ========== FB MATCH DATA ==========
function initFBMatch(mid,m){
  if(!D.fbM)D.fbM={};
  if(!D.fbM[mid])D.fbM[mid]={g1a:Array(18).fill(null),g2a:Array(18).fill(null),g1b:Array(18).fill(null),g2b:Array(18).fill(null)};
}

function calcFBMatch(mid){
  if(!D.fbM||!D.fbM[mid])return{holes:Array(18).fill(null),leadA:0,status:'TIED',played:0,ptsA:null,ptsB:null};
  const md=D.fbM[mid];
  const holes=[];let leadA=0,played=0;
  for(let h=0;h<18;h++){
    const a1=md.g1a[h],a2=md.g2a[h],b1=md.g1b[h],b2=md.g2b[h];
    // Need at least 1 score per side
    const hasA=(a1!=null||a2!=null),hasB=(b1!=null||b2!=null);
    if(!hasA||!hasB){holes.push(null);continue}
    const bbA=Math.min(a1!=null?a1:99,a2!=null?a2:99);
    const bbB=Math.min(b1!=null?b1:99,b2!=null?b2:99);
    if(bbA<bbB){holes.push('+');leadA++}
    else if(bbB<bbA){holes.push('-');leadA--}
    else{holes.push('AS')}
    played++;
  }
  let status,ptsA=null,ptsB=null;
  if(leadA>0)status=leadA+'UP';
  else if(leadA<0)status=Math.abs(leadA)+'UP';
  else status='TIED';
  // Final result if all 18 played
  if(played>=18||(played>0)){
    if(leadA>0){ptsA=3;ptsB=0}
    else if(leadA<0){ptsA=0;ptsB=3}
    else{ptsA=1.5;ptsB=1.5}
    // Auto-update fbR for team totals
    if(played>=18)D.fbR[mid]={a:ptsA,b:ptsB};
  }
  return{holes,leadA,status,played,ptsA,ptsB};
}

function fbHoleIn(mid,gk,h,v){
  if(!D.fbM)D.fbM={};
  if(!D.fbM[mid])D.fbM[mid]={g1a:Array(18).fill(null),g2a:Array(18).fill(null),g1b:Array(18).fill(null),g2b:Array(18).fill(null)};
  D.fbM[mid][gk][h]=v===''?null:parseInt(v);
  // Recalc to update fbR
  calcFBMatch(mid);
  saveLocal();render();
}

// ========== INPUT ==========
function smIn(f,t,h,v){
  if(!D.sm[f])D.sm[f]={};
  if(!D.sm[f][t])D.sm[f][t]={n:getName(f,t),s:Array(18).fill(null)};
  D.sm[f][t].s[h]=v===''?null:parseInt(v);
  saveLocal();render();
}
function fbIn(mid,tA,tB,v){
  const pts=v===''?null:parseFloat(v);
  const ptsB=pts===null?null:(pts===3?0:pts===1.5?1.5:pts===0?3:null);
  D.fbR[mid]={a:pts,b:ptsB};
  saveLocal();render();
}
function fbBtn(mid,tA,tB,ptsA){
  const ptsB=ptsA===3?0:ptsA===1.5?1.5:3;
  D.fbR[mid]={a:ptsA,b:ptsB};
  saveLocal();render();
}

// ========== SERVER ==========
async function syncToServer(){
  if(syncing)return;syncing=true;showLoad(true);
  try{
    for(const[f,teams]of Object.entries(D.sm)){
      const rows=[];
      for(const[t,d]of Object.entries(teams)){
        if(!d.s||!d.s.some(v=>v!=null))continue;
        rows.push({flight:f,team:t,golfer:getName(f,t),scores:d.s});
      }
      if(rows.length>0)await post({action:'save',sheet:'SM',rows});
    }
    for(const[mid,r]of Object.entries(D.fbR)){
      if(r.a!=null)await post({action:'saveFB',matchId:mid,ptsA:r.a,ptsB:r.b});
    }
    // Sync SP scores
    if(D.sp&&D.sp.golfers){
      const spRows=D.sp.golfers.filter(g=>g.sc&&g.sc.some(v=>v!=null)).map(g=>({
        flight:'SP',team:g.s||'XD',golfer:g.n+' (HDC:'+g.h+')',scores:g.sc
      }));
      if(spRows.length>0)await post({action:'save',sheet:'SP',rows:spRows});
    }
    toast('✅ Đồng bộ thành công!',true);
  }catch(e){toast('❌ Lỗi: '+e.message,false)}
  syncing=false;showLoad(false);
}

async function fetchServer(){
  try{
    const r=await fetch(API+'?action=getAll');const d=await r.json();
    if(d.error)return;
    if(d.sm)Object.entries(d.sm).forEach(([f,teams])=>{
      if(!D.sm[f])D.sm[f]={};
      Object.entries(teams).forEach(([t,gd])=>{D.sm[f][t]={n:gd.name||getName(f,t),s:gd.scores||Array(18).fill(null)}});
    });
    if(d.fbResults)Object.entries(d.fbResults).forEach(([k,v])=>{D.fbR[k]={a:v.ptsA,b:v.ptsB}});
    saveLocal();online=true;
    document.getElementById('dot').classList.add('on');
    document.getElementById('stxt').textContent='Online - '+new Date().toLocaleTimeString('vi');
    render();
  }catch(e){online=false;document.getElementById('dot').classList.remove('on');document.getElementById('stxt').textContent='Offline'}
}

async function post(data){const r=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(data)});return r.json()}
function toast(msg,ok){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(ok?'ok':'err');setTimeout(()=>t.className='toast',2500)}
function showLoad(s){document.getElementById('loading').classList.toggle('show',s)}

init();
</script>
