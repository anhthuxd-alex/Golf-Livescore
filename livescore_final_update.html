@import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap');

.fb-hole{display:flex;align-items:center;gap:4px;padding:6px 4px;border-bottom:1px solid #1e3050}

.fb-sumrow{display:flex;align-items:center;gap:8px;margin-top:6px;padding:8px;background:#0b1121;border-radius:6px;border:1px solid #1e3050}
.fb-sumrow .lab{font-size:9px;color:#64748b;font-weight:700;text-transform:uppercase}
.fb-sumrow .tot{font-size:18px;font-weight:900}
.tbl{width:100%;border-collapse:collapse;font-size:10px}
.tbl th{background:#1e3050;color:#94a3b8;padding:5px;font-weight:700}
.tbl td{padding:5px;text-align:center;border-bottom:1px solid #1e3050}
.bar{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(0deg,#0b1121 70%,transparent);padding:14px 10px 10px;display:flex;gap:8px}
.btn{flex:1;padding:12px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.1s}
.btn:active{transform:scale(.97)}
.btn-p{background:#2563eb;color:#fff}
.btn-s{background:#1e3050;color:#94a3b8}
.toast{position:fixed;top:64px;left:50%;transform:translateX(-50%);padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;z-index:200;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}.toast.ok{background:#16a34a;color:#fff}.toast.err{background:#dc2626;color:#fff}
.loading{display:none;position:fixed;inset:0;background:#0b1121cc;z-index:300;align-items:center;justify-content:center}.loading.show{display:flex}
.spin{width:36px;height:36px;border:3px solid #1e3050;border-top-color:#60a5fa;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
/* Name change approval */
.nc-badge{display:inline-block;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:4px;vertical-align:middle}
.nc-pending{background:#78350f;color:#fbbf24}
.nc-row{display:flex;align-items:center;gap:6px;padding:6px 8px;background:#1c1307;border:1px solid #78350f;border-radius:6px;margin:4px 0}
.nc-row .old{font-size:10px;color:#94a3b8;text-decoration:line-through}
.nc-row .new{font-size:10px;color:#fbbf24;font-weight:600}
.nc-row .arrow{font-size:10px;color:#475569}
.nc-btn{padding:4px 10px;border-radius:4px;border:none;font-size:10px;font-weight:700;cursor:pointer}
.nc-ok{background:#166534;color:#22c55e}
.nc-no{background:#7f1d1d;color:#fca5a5}
</style>

<body>
<div class="hdr">

<div class="status"><div class="dot" id="dot"></div><span id="stxt">Đang kết nối...</span></div>
</div>

<script>
// ★★★ THAY URL NÀY ★★★
const API = 'https://script.google.com/macros/s/AKfycbz_BGfKU-5sErZyZfeiNMPg6om99Hnl_TzhAeXiJVV6ur0GFq-6Saui3AE9fDpxmigBHw/exec';

const T=['BK','GT','KT','XD'];
const TN={BK:'ĐH Bách khoa',GT:'ĐH Giao thông VT',KT:'ĐH Kiến trúc',XD:'ĐH Xây dựng'};
const GR=['A+','A','B','C','D','E','F'];
const PAR=[4,3,4,5,4,4,5,3,4, 4,4,3,5,4,3,4,5,4]; // C+D = 72
// Stroke Play sân B+C
const PAR_SP_B=[4,3,4,5,4,4,4,3,5]; // Sân B = 36
const PAR_SP_C=[4,3,4,5,4,4,5,3,4]; // Sân C = 36
const PAR_SP=PAR_SP_B.concat(PAR_SP_C); // B+C = 72

// Stroke Play golfer presets (from registration data)
const SP_GOLFERS=[
{n:'Minh (KM Thời)',h:11.2,s:'XD'},{n:'Đỗ Việt Tân',h:12.1,s:'XD'},{n:'Đặng Ngọc Tiến',h:11.8,s:'XD'},
{n:'Hùng (KM Thời)',h:14.5,s:'XD'},{n:'Nguyễn Viết Trường',h:13.1,s:'XD'},{n:'Thành 39',h:16.1,s:'XD'},
{n:'Phạm Xuân Thịnh',h:16.1,s:'XD'},{n:'Nguyễn Hồng Quân',h:11.7,s:'XD'},{n:'Nhất Nhất',h:29.9,s:'XD'},
{n:'Ms Giao',h:26.6,s:'XD'},{n:'Đinh Văn Tưởng',h:10.9,s:'XD'},{n:'Nguyễn Thành Nam',h:11.3,s:'XD'},
{n:'Phạm Quang Huy',h:10.3,s:'XD'},{n:'Dũng bay',h:12.2,s:'XD'},{n:'TTK Trung 46',h:21,s:'XD'},
{n:'Phạm Đức Lâm',h:24.5,s:'XD'},{n:'Phạm Hoàng Trung',h:16.5,s:'XD'},{n:'Nola Nguyen',h:17.6,s:'XD'},
{n:'Trần Thị Ánh',h:20.4,s:'XD'},{n:'A Giang Fuji',h:12,s:'XD'},{n:'Đoàn Đạt',h:16.3,s:'XD'},
{n:'Nguyễn Minh Tân',h:15,s:'XD'},{n:'Dương Công Định',h:26.3,s:'XD'},{n:'Hùng Alex',h:18.9,s:'XD'},
{n:'Mr Tân',h:16.1,s:'XD'},{n:'Chưởng',h:15.4,s:'XD'},{n:'Quang (KM)',h:11.6,s:'XD'},
];
let curSPFilter='all', curSPFlight=null;

// SM golfer preset data
const SM={
'A+':{BK:{n:'Nguyễn Văn Long',h:2.9},GT:{n:'Hoàng Quân',h:1.7},KT:{n:'Nguyễn Văn Tám',h:1.9},XD:{n:'Dương Văn Vinh',h:4.2}},
'A':{BK:{n:'Đỗ Thành Trung',h:5.5},GT:{n:'Nguyễn Quang Hiệp',h:5.7},KT:{n:'Chu Minh Tiến',h:8.4},XD:{n:'Nguyễn Văn Vĩnh',h:6.9}},
'B':{BK:{n:'Thạch',h:7.4},GT:{n:'Hoàng Anh Tuấn',h:7.3},KT:{n:'Hoàng Hữu Sơn',h:7.3},XD:{n:'Phan Việt Anh',h:7.9}},
'C':{BK:{n:'Vũ Hoàng Anh',h:11.6},GT:{n:'Nguyễn Văn Lợi',h:11},KT:{n:'Hoàng Thế Thực',h:10.7},XD:{n:'Nguyễn Viết Sang',h:10.4}},
'D':{BK:{n:'Nguyễn Ngọc Chiến',h:13.7},GT:{n:'Đậu Thắng',h:13.2},KT:{n:'Nguyễn Văn Nghĩa',h:12.1},XD:{n:'Ngô Ngọc Thu',h:13.5}},
'E':{BK:{n:'Đỗ Trường Giang',h:14.2},GT:{n:'Lưu Thanh Hà',h:15.6},KT:{n:'Lê Văn Trung',h:15.2},XD:{n:'Hoàng Ngọc',h:15.3}},
'F':{BK:{n:'Dương Trung Thủy',h:17.6},GT:{n:'Phạm Việt Cường',h:16.5},KT:{n:'Nguyễn Văn Hải',h:16.4},XD:{n:'Chu Văn Tiên',h:17.5}}
};

const FB=[
{p:'A',hdc:'≥10',m:[{a:'BK',b:'GT',g:['Lê Xuân Quý & Vũ Ngọc Biên','Hoàng Văn Hùng & Nguyễn Tuấn Hưng']},{a:'KT',b:'XD',g:['Nguyễn Anh Vũ & Tống Trung Hiếu','Ngô Văn Dũng & Vũ Minh Huy']}]},
{p:'B',hdc:'≥18',m:[{a:'KT',b:'BK',g:['Nguyễn Mạnh Chiến & Vũ Trọng Hùng','Lê Đức Kiên & Trịnh Văn Hùng']},{a:'XD',b:'GT',g:['Nguyễn Văn Kiên & Lê Đình Thời','Đặng Thanh Hải & Nguyễn Văn Khởi']}]},
{p:'C',hdc:'≥22',m:[{a:'GT',b:'KT',g:['Lê Anh Dũng & Vương Duy Hoàn','Phạm Quốc Toản & Trần Quang Hoà']},{a:'BK',b:'XD',g:['Nguyễn Thu Hương & Bùi Quang Trung','Hoàng Thanh Sơn & Hoàng Văn Công']}]},
{p:'D',hdc:'≥26',m:[{a:'KT',b:'XD',g:['Nguyễn Ngọc Trỗi & Nguyễn Trần Dũng','Nguyễn Trung Dũng & Nguyễn Phúc Dũng']},{a:'BK',b:'GT',g:['Trần Xuân Hùng & Nguyễn Văn Bình','Nguyễn Mạnh Quân & Hoàng Anh Ngọc']}]},
{p:'E',hdc:'≥30',m:[{a:'XD',b:'GT',g:['Đỗ Quang Huy & Nguyễn Xuân Điệp','Nguyễn Đình Thành & Lê Tiến Dũng']},{a:'KT',b:'BK',g:['Nguyễn Đức Thắng & Hà Duy Khánh','Vũ Thế Hải & Trần Đăng Khoa']}]},
{p:'F',hdc:'≥34',m:[{a:'GT',b:'KT',g:['Nguyễn Huy Hoàng & Nguyễn Viết Tân','Đỗ Hoàng Tùng & Nông Hồng Lộc']},{a:'BK',b:'XD',g:['Vũ Văn Chính & Lê Quốc Vượng','Hoàng Anh Thư & Vũ Thái Sơn']}]}
];

// ========== PIN & AUTHORIZATION ==========
// PIN mặc định: BTC có thể override qua Google Sheet "PIN Config"
// Pattern: 1xxx = SM flight, 2xxx = FB pair, 9999 = BTC master
const DEFAULT_PINS={
  // scope: 'sm:FLIGHT' | 'fb:PAIR' | 'btc'
  '1001':{scope:'sm:A+',label:'SM Bảng A+'},
  '1002':{scope:'sm:A', label:'SM Bảng A'},
  '1003':{scope:'sm:B', label:'SM Bảng B'},
  '1004':{scope:'sm:C', label:'SM Bảng C'},
  '1005':{scope:'sm:D', label:'SM Bảng D'},
  '1006':{scope:'sm:E', label:'SM Bảng E'},
  '1007':{scope:'sm:F', label:'SM Bảng F'},
  '2001':{scope:'fb:A', label:'FB Cặp A'},
  '2002':{scope:'fb:B', label:'FB Cặp B'},
  '2003':{scope:'fb:C', label:'FB Cặp C'},
  '2004':{scope:'fb:D', label:'FB Cặp D'},
  '2005':{scope:'fb:E', label:'FB Cặp E'},
  '2006':{scope:'fb:F', label:'FB Cặp F'},
  '3001':{scope:'sp',   label:'Stroke Play'},
  '9999':{scope:'btc',  label:'Ban Tổ Chức'}
};
// Runtime PIN map (merges DEFAULT_PINS with server overrides)
let PINS={...DEFAULT_PINS};
// Current authenticated session
let auth=null; // {pin, scope, label} when logged in

// ========== STATE ==========
let mode='caddy',tab='sm',curFlight=null,curPair=null;
let D={sm:{},fb:{},fbR:{},nameChanges:{},changeReqs:{}}; // changeReqs: {pin: {fromScope, toScope, reason, status, ts}}
let online=false,syncing=false;

function init(){
  loadLocal();
  GR.forEach(f=>{if(!D.sm[f]){D.sm[f]={};T.forEach(t=>{D.sm[f][t]={n:SM[f][t].n,s:Array(18).fill(null)}})}});
  if(!D.nameChanges)D.nameChanges={};
  if(!D.changeReqs)D.changeReqs={};
  render();fetchServer();
  setInterval(()=>{if(mode==='live'||mode==='btc')fetchServer()},15000);
}
function loadLocal(){try{D=JSON.parse(localStorage.getItem('g4t3')||'{}');if(!D.sm)D.sm={};if(!D.fb)D.fb={};if(!D.fbR)D.fbR={};if(!D.nameChanges)D.nameChanges={};if(!D.sp)D.sp={};if(!D.fbM)D.fbM={};if(!D.fbH)D.fbH={};if(!D.changeReqs)D.changeReqs={};// restore auth session
  const savedAuth=localStorage.getItem('g4t3_auth');if(savedAuth){try{auth=JSON.parse(savedAuth)}catch(e){auth=null}}
  // restore PIN overrides
  const savedPins=localStorage.getItem('g4t3_pins');if(savedPins){try{PINS={...DEFAULT_PINS,...JSON.parse(savedPins)}}catch(e){}}
}catch(e){D={sm:{},fb:{},fbR:{},nameChanges:{},sp:{},fbM:{},fbH:{},changeReqs:{}}}}
function saveLocal(){localStorage.setItem('g4t3',JSON.stringify(D));if(auth)localStorage.setItem('g4t3_auth',JSON.stringify(auth))}

// ========== AUTH ==========
function tryLogin(pin){
  pin=(pin||'').trim();
  if(!/^\d{4}$/.test(pin)){toast('PIN phải là 4 chữ số',false);return false}
  const p=PINS[pin];
  if(!p){toast('PIN không hợp lệ',false);return false}
  auth={pin,scope:p.scope,label:p.label};
  localStorage.setItem('g4t3_auth',JSON.stringify(auth));
  // Auto-select scope
  if(p.scope.startsWith('sm:')){mode='caddy';tab='sm';curFlight=p.scope.slice(3)}
  else if(p.scope.startsWith('fb:')){mode='caddy';tab='fb';curPair=FB.findIndex(x=>x.p===p.scope.slice(3))}
  else if(p.scope==='sp'){mode='caddy';tab='sp'}
  else if(p.scope==='btc'){mode='btc';tab='approve'}

// Permission check: can current auth edit this scope?
function canEdit(scopeStr){
  if(!auth)return false;
  if(auth.scope==='btc')return true;
  return auth.scope===scopeStr;
}
// Request change of scope (goes to BTC)
function requestChange(toScope,reason){
  if(!auth||auth.scope==='btc')return;
  D.changeReqs[auth.pin]={
    fromScope:auth.scope,
    fromLabel:auth.label,
    toScope,
    toLabel:(PINS[Object.keys(PINS).find(k=>PINS[k].scope===toScope)]||{label:toScope}).label||toScope,
    reason:reason||'',
    status:'pending',
    ts:new Date().toISOString()
  };
  saveLocal();
  // Try to sync to server so BTC thấy ngay
  post({action:'changeReq',pin:auth.pin,fromScope:auth.scope,toScope,reason:reason||''}).catch(()=>{});
  toast('✅ Đã gửi yêu cầu cho BTC',true);render();
}
// BTC approves a change request → update PIN mapping on this device
function approveChange(pin){
  const req=D.changeReqs[pin];if(!req)return;
  req.status='approved';req.approvedTs=new Date().toISOString();
  // Override PIN scope locally (BTC machine); also sync
  PINS[pin]={scope:req.toScope,label:(PINS[pin]?PINS[pin].label.split(' → ')[0]:pin)+' → '+req.toLabel};
  // Persist PIN override
  const pinOverrides={};Object.keys(PINS).forEach(k=>{if(JSON.stringify(PINS[k])!==JSON.stringify(DEFAULT_PINS[k]))pinOverrides[k]=PINS[k]});
  localStorage.setItem('g4t3_pins',JSON.stringify(pinOverrides));
  post({action:'approveChange',pin,toScope:req.toScope}).catch(()=>{});
  saveLocal();toast('✅ Đã duyệt',true);render();
}
function rejectChange(pin){
  const req=D.changeReqs[pin];if(!req)return;
  req.status='rejected';req.rejectedTs=new Date().toISOString();
  post({action:'rejectChange',pin}).catch(()=>{});
  saveLocal();toast('Đã từ chối',true);render();
}

}

function getName(f,t){
  const key=f+'_'+t;

  if(nc&&nc.status==='approved')return nc.new;
  return D.sm[f]?.[t]?.n||SM[f]?.[t]?.n||'';
}

function proposeName(f,t,newName){
  const key=f+'_'+t;
  const orig=SM[f]?.[t]?.n||'';
  if(newName.trim()===orig){delete D.nameChanges[key];} // reverted to original
  else{D.nameChanges[key]={old:orig,new:newName.trim(),status:'pending'};}
  if(D.sm[f]&&D.sm[f][t])D.sm[f][t].n=newName.trim();
  saveLocal();render();
}

  // Revert name
  if(D.sm[f]&&D.sm[f][t])D.sm[f][t].n=nc.old;
  delete D.nameChanges[key];
  saveLocal();render();toast('Đã từ chối, khôi phục tên cũ',1);
}

// ========== SM CALC ==========
function calcSM(f){
  const r={};T.forEach(t=>{r[t]={hp:Array(18).fill(null),thp:0,mp:0}});
  const fd=D.sm[f];if(!fd)return r;
  for(let h=0;h<18;h++){
    const sc=T.map(t=>fd[t]?.s?.[h]);
    if(sc.some(v=>v==null))continue;
    const ns=sc.map(Number),mn=Math.min(...ns),cnt=ns.filter(v=>v===mn).length;
    T.forEach((t,i)=>{r[t].hp[h]=ns[i]===mn?(cnt===1?3:cnt===2?1.5:cnt===3?1:0):0});
  }
  T.forEach(t=>{r[t].thp=r[t].hp.reduce((a,v)=>a+(v||0),0)});
  const tots=T.map(t=>r[t].thp),mx=Math.max(...tots);
  if(mx>0){const cm=tots.filter(v=>v===mx).length;T.forEach((t,i)=>{if(tots[i]===mx)r[t].mp=cm===1?3:cm===2?1.5:cm===3?1:0})}
  return r;
}
function teamTotals(){
  const tot={};T.forEach(t=>{tot[t]={sm:0,fb:0}});
  GR.forEach(f=>{const r=calcSM(f);T.forEach(t=>{tot[t].sm+=r[t].mp})});
  // FB: dùng điểm trận tính live từ fbH (kết quả hố của CẶP)
  for(const pair of FB){
    for(let mi=0;mi<2;mi++){
      const mid=pair.p+'_'+(mi===0?'A':'B');
      const m=pair.m[mi];
      const c=calcFBMatch(mid);
      // Chỉ cộng điểm trận khi caddy đã nhập ít nhất 1 hố (điểm tạm, live)
      if(c.played>0){
        if(c.ptsA!=null)tot[m.a].fb+=Number(c.ptsA);
        if(c.ptsB!=null)tot[m.b].fb+=Number(c.ptsB);
      }
    }
  }
  return tot;
}

function editPin(oldPin){
  const cfg=PINS[oldPin];if(!cfg)return;
  const newPin=prompt('Đổi PIN cho "'+cfg.label+'"\nPIN mới (4 chữ số):',oldPin);
  if(!newPin||!/^\d{4}$/.test(newPin)){if(newPin!==null)toast('PIN phải là 4 chữ số',false);return}
  if(newPin!==oldPin&&PINS[newPin]){toast('PIN '+newPin+' đã được dùng',false);return}
  delete PINS[oldPin];PINS[newPin]={...cfg};
  const pinOverrides={};Object.keys(PINS).forEach(k=>{
    if(!DEFAULT_PINS[k]||JSON.stringify(PINS[k])!==JSON.stringify(DEFAULT_PINS[k]))pinOverrides[k]=PINS[k];
  });
  localStorage.setItem('g4t3_pins',JSON.stringify(pinOverrides));
  post({action:'savePins',pins:PINS}).catch(()=>{});
  toast('✅ PIN đã cập nhật: '+newPin,true);render();
}
function resetAllPins(){
  if(!confirm('Khôi phục toàn bộ PIN về mặc định?'))return;
  PINS={...DEFAULT_PINS};
  localStorage.removeItem('g4t3_pins');
  post({action:'savePins',pins:PINS}).catch(()=>{});
  toast('Đã reset về mặc định',true);render();
}

    </div>`;

    const fl=flights[curSPFlight]||[];
    const inputs=fl.map(g=>{
      const gi=golfers.indexOf(g);
      const sc=g.sc||Array(18).fill(null);
      const gross=sc.reduce((a,v)=>a+(v||0),0),cnt=sc.filter(v=>v!=null).length;

      return`<div class="si"><div class="si-h">

      </div>
      <div class="hg">${PAR_SP_B.map((_,i)=>`<div class="hc"><span class="hn">${i+1}</span><span class="pr">P${PAR_SP[i]}</span>
        <input class="hi ${sc[i]!=null?'f':''}" type="number" inputmode="numeric" min="1" max="15" value="${sc[i]!=null?sc[i]:''}" onfocus="this.select()" onchange="spIn(${gi},${i},this.value)"></div>`).join('')}
        <div class="hsep"></div>
        ${PAR_SP_C.map((_,i)=>`<div class="hc"><span class="hn">${i+10}</span><span class="pr">P${PAR_SP[i+9]}</span>
        <input class="hi ${sc[i+9]!=null?'f':''}" type="number" inputmode="numeric" min="1" max="15" value="${sc[i+9]!=null?sc[i+9]:''}" onfocus="this.select()" onchange="spIn(${gi},${i+9},this.value)"></div>`).join('')}
      </div></div>`}).join('');
    return fsel+`<div class="sec"><div class="crd"><div class="crd-h"><span class="fl">Flight ${curSPFlight+1}</span><span class="st">Sân B-C | Par 72</span></div><div class="crd-b">${inputs}</div></div></div>`;
  } else {
    // Live/BTC: Leaderboard by bảng
    const filter=`<div style="display:flex;gap:5px;padding:8px">${['all','A','B','C'].map(f=>
      `<button style="flex:1;padding:8px;border-radius:7px;border:1.5px solid ${curSPFilter===f?'#7c3aed':'#1e3050'};background:${curSPFilter===f?'#2e1065':'#111b2e'};color:${curSPFilter===f?'#a78bfa':'#64748b'};font-size:11px;font-weight:700;cursor:pointer" onclick="curSPFilter='${f}';render()">${f==='all'?'Tất cả':'Bảng '+f}</button>`
    ).join('')}</div>`;
    const bangs=curSPFilter==='all'?['A','B','C']:[curSPFilter];
    const cards=bangs.map(b=>{
      const hdcR=b==='A'?'HDC 0-12':b==='B'?'HDC 13-20':'HDC 21+';
      const bg=golfers.filter(g=>spBang(g.h)===b).map(g=>{

      });
      if(bg.length===0)return'';
      return`<div class="crd"><div class="crd-h" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'':'none'">
        <span class="fl">Bảng ${b} <span style="font-size:10px;color:#94a3b8;font-weight:500">(${hdcR})</span></span>
        <span class="st">${bg.filter(g=>g.cnt>0).length}/${bg.length} đã nhập</span></div>
        <div class="crd-b">${bg.map((g,i)=>{
          const gi=golfers.indexOf(golfers.find(x=>x.id===g.id));
          const rkc=g.cnt>0?(i===0?'color:#eab308':i===1?'color:#94a3b8':i===2?'color:#cd7f32':'color:#64748b'):'color:#334155';
          return`<div class="gr">
            <div style="font-size:13px;font-weight:900;min-width:24px;text-align:center;${rkc}">${g.cnt>0?i+1:'-'}</div>
            <div class="bdg t-${g.s||'XD'}" style="font-size:7px">${g.s||'?'}</div>
            <div class="nm">${g.n}<small>HDC:${g.h} | ${g.cnt}/18 hố</small></div>
            <div style="font-size:11px;color:#64748b;min-width:28px;text-align:center">${g.cnt>0?g.gross:'-'}</div>
            <div style="font-size:15px;font-weight:900;color:#22c55e;min-width:34px;text-align:right">${g.net!=null?g.net:'-'}</div>
            ${mode==='btc'?`<button onclick="spEdit(${gi})" style="background:#1e3050;color:#60a5fa;border:none;border-radius:4px;padding:3px 6px;font-size:9px;cursor:pointer;font-weight:700">✏️</button>
            <button onclick="spDel(${gi})" style="background:#7f1d1d;color:#fca5a5;border:none;border-radius:4px;padding:3px 6px;font-size:9px;cursor:pointer;font-weight:700">✗</button>`:''}
          </div>`}).join('')}</div></div>`;
    }).join('');
    const btcAdd=mode==='btc'?`<div style="padding:8px"><button onclick="addSPGolfer()" style="width:100%;padding:10px;border-radius:8px;border:2px dashed #7c3aed;background:#2e1065;color:#a78bfa;font-size:12px;font-weight:700;cursor:pointer">+ Thêm golfer Stroke Play</button></div>`:'';
    return filter+btcAdd+'<div class="sec">'+cards+'</div>';
  }
}

function spIn(gi,h,v){
  initSP();
  D.sp.golfers[gi].sc[h]=v===''?null:parseInt(v);
  saveLocal();render();
}
function spName(gi,v){
  initSP();
  D.sp.golfers[gi].n=v.trim();
  saveLocal();render();
}
function addSPGolfer(){
  initSP();
  const n=prompt('Tên golfer:');if(!n)return;
  const h=parseFloat(prompt('HDC Index:'))||20;
  const s=prompt('Trường (BK/GT/KT/XD):','XD')||'XD';
  D.sp.golfers.push({id:'sp'+Date.now(),n:n.trim(),h,s:s.toUpperCase(),sc:Array(18).fill(null)});
  saveLocal();render();
}
function spEdit(gi){
  initSP();
  const g=D.sp.golfers[gi];if(!g)return;
  const n=prompt('Tên golfer:',g.n);if(n===null)return;
  const h=prompt('HDC Index:',g.h);if(h===null)return;
  const s=prompt('Trường (BK/GT/KT/XD):',g.s);if(s===null)return;
  g.n=n.trim();g.h=parseFloat(h)||g.h;g.s=s.toUpperCase()||g.s;
  saveLocal();render();toast('✅ Đã cập nhật '+g.n,true);
}
function spDel(gi){
  initSP();
  const g=D.sp.golfers[gi];if(!g)return;
  if(!confirm('Xóa golfer '+g.n+'?'))return;
  D.sp.golfers.splice(gi,1);
  saveLocal();render();toast('Đã xóa '+g.n,true);
}

// ========== FB MATCH DATA (new: W/D/L per hole from side A perspective) ==========
// D.fbH[mid] = Array(18) of 'W' | 'D' | 'L' | null
//   W: side A thắng hố (A +3, B +0)
//   D: hoà hố          (A +1.5, B +1.5)
//   L: side A thua hố  (A +0, B +3)
function initFBMatch(mid){
  if(!D.fbH)D.fbH={};
  if(!D.fbH[mid])D.fbH[mid]=Array(18).fill(null);
}

function calcFBMatch(mid){
  if(!D.fbH||!D.fbH[mid])return{holes:Array(18).fill(null),cumLead:Array(18).fill(0),leadA:0,totA:0,totB:0,played:0,ptsA:null,ptsB:null};
  const hd=D.fbH[mid];
  const holes=[],cumLead=[];
  let leadA=0,totA=0,totB=0,played=0;
  for(let h=0;h<18;h++){
    const r=hd[h];
    if(r==='W'){holes.push('+');totA+=3;leadA++}
    else if(r==='L'){holes.push('-');totB+=3;leadA--}
    else if(r==='D'){holes.push('AS');totA+=1.5;totB+=1.5}
    else{holes.push(null)}
    cumLead.push(leadA);
    if(r)played++;
  }
  let ptsA=null,ptsB=null;
  // Match point: tổng điểm hố cao hơn -> thắng trận (3đ). Bằng -> 1.5đ. Thua -> 0đ.
  if(played>0){
    if(totA>totB){ptsA=3;ptsB=0}
    else if(totB>totA){ptsA=0;ptsB=3}
    else{ptsA=1.5;ptsB=1.5}
    // Only commit to team totals when all 18 played
    if(played>=18){
      if(!D.fbR)D.fbR={};
      D.fbR[mid]={a:ptsA,b:ptsB};
    }
  }
  return{holes,cumLead,leadA,totA,totB,played,ptsA,ptsB};
}

function fbSetHole(mid,h,result){
  initFBMatch(mid);
  // Toggle off if same button pressed again
  if(D.fbH[mid][h]===result)D.fbH[mid][h]=null;
  else D.fbH[mid][h]=result;
  // Recalc to sync team totals if 18 holes complete
  calcFBMatch(mid);
  saveLocal();render();
}

function fbClearMatch(mid){
  if(!confirm('Xóa toàn bộ kết quả 18 hố của trận này?'))return;
  D.fbH[mid]=Array(18).fill(null);
  if(D.fbR&&D.fbR[mid])delete D.fbR[mid];
  saveLocal();render();toast('Đã xóa kết quả trận',true);
}

// ========== INPUT ==========
function smIn(f,t,h,v){
  if(!D.sm[f])D.sm[f]={};
  if(!D.sm[f][t])D.sm[f][t]={n:getName(f,t),s:Array(18).fill(null)};
  D.sm[f][t].s[h]=v===''?null:parseInt(v);
  saveLocal();render();
}

// ========== SERVER ==========
async function syncToServer(){
  if(syncing)return;syncing=true;showLoad(true);
  try{
    for(const[f,teams]of Object.entries(D.sm)){
      const rows=[];
      for(const[t,d]of Object.entries(teams)){
        if(!d.s||!d.s.some(v=>v!=null))continue;
        rows.push({flight:f,team:t,golfer:getName(f,t),scores:d.s});
      }
      if(rows.length>0)await post({action:'save',sheet:'SM',rows});
    }
    // Sync FB: push per-hole W/D/L results + match points
    if(D.fbH){
      const fbRows=[];
      for(const pair of FB){
        for(let mi=0;mi<2;mi++){
          const mid=pair.p+'_'+(mi===0?'A':'B');
          const hd=D.fbH[mid];
          if(!hd||!hd.some(v=>v))continue;
          const m=pair.m[mi];
          const calc=calcFBMatch(mid);
          // Convert to per-hole points: A side and B side perspective (3/1.5/0)
          const aPts=hd.map(r=>r==='W'?3:r==='D'?1.5:r==='L'?0:null);
          const bPts=hd.map(r=>r==='L'?3:r==='D'?1.5:r==='W'?0:null);
          fbRows.push({pair:pair.p,match:mi+1,team:m.a,matchPt:calc.ptsA,totalHolePt:calc.totA,holePts:aPts});
          fbRows.push({pair:pair.p,match:mi+1,team:m.b,matchPt:calc.ptsB,totalHolePt:calc.totB,holePts:bPts});
        }
      }
      if(fbRows.length>0)await post({action:'saveFB2',rows:fbRows});
    }
    // Also push legacy fbR for backward compat
    for(const[mid,r]of Object.entries(D.fbR||{})){
      if(r.a!=null)await post({action:'saveFB',matchId:mid,ptsA:r.a,ptsB:r.b});
    }
    // Sync SP scores
    if(D.sp&&D.sp.golfers){
      const spRows=D.sp.golfers.filter(g=>g.sc&&g.sc.some(v=>v!=null)).map(g=>({
        flight:'SP',team:g.s||'XD',golfer:g.n+' (HDC:'+g.h+')',scores:g.sc
      }));
      if(spRows.length>0)await post({action:'save',sheet:'SP',rows:spRows});
    }
    toast('✅ Đồng bộ thành công!',true);
  }catch(e){toast('❌ Lỗi: '+e.message,false)}
  syncing=false;showLoad(false);
}

async function fetchServer(){
  try{
    const r=await fetch(API+'?action=getAll');const d=await r.json();
    if(d.error)return;
    if(d.sm)Object.entries(d.sm).forEach(([f,teams])=>{
      if(!D.sm[f])D.sm[f]={};
      Object.entries(teams).forEach(([t,gd])=>{D.sm[f][t]={n:gd.name||getName(f,t),s:gd.scores||Array(18).fill(null)}});
    });
    if(d.fbResults)Object.entries(d.fbResults).forEach(([k,v])=>{D.fbR[k]={a:v.ptsA,b:v.ptsB}});
    if(d.fbHoles){
      if(!D.fbH)D.fbH={};
      Object.entries(d.fbHoles).forEach(([k,v])=>{if(Array.isArray(v)&&v.length===18)D.fbH[k]=v});
      for(const pair of FB){
        for(let mi=0;mi<2;mi++){
          const mid=pair.p+'_'+(mi===0?'A':'B');
          if(D.fbH[mid])calcFBMatch(mid);
        }
      }
    }
    // === PIN overrides from server ===
    if(d.pins&&typeof d.pins==='object'){
      PINS={...DEFAULT_PINS,...d.pins};
      // Persist overrides locally (only diffs from defaults)
      const diff={};Object.keys(PINS).forEach(k=>{
        if(!DEFAULT_PINS[k]||JSON.stringify(PINS[k])!==JSON.stringify(DEFAULT_PINS[k]))diff[k]=PINS[k];
      });
      localStorage.setItem('g4t3_pins',JSON.stringify(diff));
      // If current auth PIN was remapped → update auth label/scope
      if(auth&&PINS[auth.pin]){
        auth.scope=PINS[auth.pin].scope;
        auth.label=PINS[auth.pin].label;
        localStorage.setItem('g4t3_auth',JSON.stringify(auth));
      } else if(auth&&!PINS[auth.pin]){
        // PIN bị xoá → logout
        toast('PIN của bạn đã bị thu hồi',false);
        auth=null;localStorage.removeItem('g4t3_auth');
      }
    }
    // === Change requests from server ===
    if(d.changeReqs&&typeof d.changeReqs==='object'){
      if(!D.changeReqs)D.changeReqs={};
      Object.entries(d.changeReqs).forEach(([pin,req])=>{D.changeReqs[pin]=req});
    }
    saveLocal();online=true;
    document.getElementById('dot').classList.add('on');
    document.getElementById('stxt').textContent='Online - '+new Date().toLocaleTimeString('vi');
    render();
  }catch(e){online=false;document.getElementById('dot').classList.remove('on');document.getElementById('stxt').textContent='Offline'}
}

async function post(data){const r=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(data)});return r.json()}
function toast(msg,ok){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(ok?'ok':'err');setTimeout(()=>t.className='toast',2500)}
function showLoad(s){document.getElementById('loading').classList.toggle('show',s)}

init();
</script>
